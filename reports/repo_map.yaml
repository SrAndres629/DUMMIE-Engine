layers:
  L0_overseer:
    path: "layers/l0_overseer"
    role: "Low-level supervision"
  L1_nervous:
    path: "layers/l1_nervous"
    role: "Transport, IPC, MCP tools"
    violations:
      - "sys.path manipulation to import L2"
  L2_brain:
    path: "layers/l2_brain"
    role: "Pure logic, models, adapters"
