      - "models.py"
      - "adapters.py"
  L3_shield:
    path: "layers/l3_shield"
    role: "Security and topological audit"
    violations:
      - "Symbolic validation fallback in TopologicalAuditor"
contracts:
  - "AuthorityLevel"
  - "IntentType"
  - "MemoryNode4D"
