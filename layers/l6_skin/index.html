<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DUMMIE Engine | L6 Skin</title>
    <style>
      :root {
        --bg-dark: #0a0a0c;
        --accent: #00f2ff;
        --glass: rgba(255, 255, 255, 0.05);
        --text: #e0e0e0;
      }
      body {
        margin: 0;
        background: var(--bg-dark);
        color: var(--text);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }
      #root {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
      }
      .dashboard {
        background: var(--glass);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 40px;
        width: 80%;
        max-width: 800px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      h1 {
        font-size: 3rem;
        font-weight: 800;
        letter-spacing: -2px;
        background: linear-gradient(to right, #fff, #00f2ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0;
      }
      .pulse {
        font-size: 5rem;
        font-family: 'JetBrains Mono', monospace;
        color: var(--accent);
        text-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
        margin: 20px 0;
      }
      .status {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 40px;
      }
      .badge {
        padding: 8px 16px;
        border-radius: 99px;
        background: rgba(0, 242, 255, 0.1);
        border: 1px solid var(--accent);
        font-size: 0.8rem;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .grid {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div id="root">
      <div class="dashboard">
        <p style="color: #666; margin: 0;">Sovereign Infrastructure Monitor</p>
        <h1>DUMMIE ENGINE</h1>
        <div class="pulse" id="tick">000000</div>
        <div class="status">
          <div class="badge">L0 ACTIVE</div>
          <div class="badge">L1 SYNC</div>
          <div class="badge">L4 READY</div>
        </div>
      </div>
    </div>
    <script>
      let tick = 0;
      const el = document.getElementById('tick');
      setInterval(() => {
        tick += Math.floor(Math.random() * 5);
        el.innerText = tick.toString().padStart(6, '0');
      }, 1000);
    </script>
  </body>
</html>
