cases:
  - id: contract_drift
    prompt: "Spec says telemetry outcome is optional but daemon code requires it."
    expected_status: CONTRADICTED
    evidence:
      - type: active_spec
        supports: true
      - type: source_code
        contradicts: true
    metrics:
      evidence_precision: 1.0
      contradiction_detection: 1.0
      corrective_action_quality: 0.9
  - id: stale_spec_vs_current_code
    prompt: "Documentation references a deleted loci.db file."
    expected_status: CONTRADICTED
    evidence:
      - type: core_spec
        supports: true
      - type: filesystem
        contradicts: true
    metrics:
      evidence_precision: 0.9
      evidence_recall: 0.8
      corrective_action_quality: 0.8
  - id: topology_cycle_vs_word_cycle
    prompt: "Detect graph cycle, not textual use of the word cycle."
    expected_status: SUPPORTED
    evidence:
      - type: test
        supports: true
    metrics:
      causal_ordering: 1.0
      hallucination_penalty: 0.0
  - id: goal_rationale_alias
