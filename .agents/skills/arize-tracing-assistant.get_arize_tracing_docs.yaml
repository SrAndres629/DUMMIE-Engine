  \ One of:\n    [\"agno\", \"amazon-bedrock\", \"anthropic\", \"autogen\", \"beeai\"\
  , \"crewai\", \"dspy\", \"google-gen-ai\", \"groq\", \"guardrails-ai\", \"haystack\"\
  ,\n    \"hugging-face-smolagents\", \"instructor\", \"langchain\", \"langflow\"\
  , \"langgraph\", \"litellm\", \"llamaindex\", \"mistralai\", \"openai\", \"openai-agents\"\
  , \"prompt-flow\",\n    \"pydantic-ai\", \"strands-agents\", \"together\", \"vercel\"\
  , \"vertexai\"]\nlanguage : str\n    Programming language: \"python\" or \"typescript\"\
  \n\nReturns\n-------\nstr\n    Example code snippets for auto/manual instrumentation\
  \ for Arize.\n. Utilidad del servidor arize-tracing-assistant.. Utilidad del servidor\
  \ arize-tracing-assistant.. Utilidad del servidor arize-tracing-assistant."
