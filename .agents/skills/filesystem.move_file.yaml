skill_id: sw.fs.move_file
name: Move File
description: Move or rename files and directories. Can move files between directories
  and rename them in a single operation. If the destination exists, the operation
  will fail. Works across different directories and can be used for simple renaming
  within the same directory. Both source and destination must be within allowed directories..
  Gestión industrial de archivos.. Gestión industrial de archivos.. Gestión industrial
  de archivos.
version: 1.1.0
capabilities:
- move_file
invariants:
- 'path_validation: strict'
- 'size_limit: 1MB'
- 'zero_trust: true'
metadata:
  server: filesystem
  status: active
