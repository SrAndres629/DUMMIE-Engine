skill_id: sw.fs.read_multiple_files
name: Read Multiple Files
description: Read the contents of multiple files simultaneously. This is more efficient
  than reading files one by one when you need to analyze or compare multiple files.
  Each file's content is returned with its path as a reference. Failed reads for individual
  files won't stop the entire operation. Only works within allowed directories.. Gestión
  industrial de archivos.. Gestión industrial de archivos.. Gestión industrial de
  archivos.
version: 1.1.0
capabilities:
- read_multiple_files
invariants:
- 'path_validation: strict'
- 'size_limit: 1MB'
- 'zero_trust: true'
metadata:
  server: filesystem
  status: active
