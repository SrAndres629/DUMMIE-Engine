skill_id: sw.fs.search_files
name: Search Files
description: Recursively search for files and directories matching a pattern. The
  patterns should be glob-style patterns that match paths relative to the working
  directory. Use pattern like '*.ext' to match files in current directory, and '**/*.ext'
  to match files in all subdirectories. Returns full paths to all matching items.
  Great for finding files when you don't know their exact location. Only searches
  within allowed directories.. Gestión industrial de archivos.. Gestión industrial
  de archivos.. Gestión industrial de archivos.
version: 1.1.0
capabilities:
- search_files
invariants:
- 'path_validation: strict'
- 'size_limit: 1MB'
- 'zero_trust: true'
metadata:
  server: filesystem
  status: active
