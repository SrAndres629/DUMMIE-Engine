skill_id: sw.fs.directory_tree
name: Directory Tree
description: Get a recursive tree view of files and directories as a JSON structure.
  Each entry includes 'name', 'type' (file/directory), and 'children' for directories.
  Files have no children array, while directories always have a children array (which
  may be empty). The output is formatted with 2-space indentation for readability.
  Only works within allowed directories.. Gestión industrial de archivos.. Gestión
  industrial de archivos.. Gestión industrial de archivos.
version: 1.1.0
capabilities:
- directory_tree
invariants:
- 'path_validation: strict'
- 'size_limit: 1MB'
- 'zero_trust: true'
metadata:
  server: filesystem
  status: active
