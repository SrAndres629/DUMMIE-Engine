skill_id: sw.fs.read_text_file
name: Read Text File
description: Read the complete contents of a file from the file system as text. Handles
  various text encodings and provides detailed error messages if the file cannot be
  read. Use this tool when you need to examine the contents of a single file. Use
  the 'head' parameter to read only the first N lines of a file, or the 'tail' parameter
  to read only the last N lines of a file. Operates on the file as text regardless
  of extension. Only works within allowed directories.. Gestión industrial de archivos..
  Gestión industrial de archivos.. Gestión industrial de archivos.
version: 1.1.0
capabilities:
- read_text_file
invariants:
- 'path_validation: strict'
- 'size_limit: 1MB'
- 'zero_trust: true'
metadata:
  server: filesystem
  status: active
